---
name: GitHub Pages preview
on:
  workflow_call:
    inputs:
      branch:
        description: "Branch to deploy"
        type: string
        required: false
        default: ""
    outputs:
      page_url:
        description: "The deployed GitHub Pages URL"
        value: ${{ jobs.deploy.outputs.page_url }}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      PATH_PREFIX: ${{ github.event.repository.name }}
    steps:
      - name: Checkout content repo
        id: checkout-content
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}
          path: content

      - name: Read site config
        id: config
        run: |
          SITE_PATH=$(grep -A1 '^- pathPrefix:' ./content/src/pages/config.md | tail -1 | sed 's/.*- //' | sed 's|^/||' | sed 's|/$||')

          if [ -z "$SITE_PATH" ]; then
            echo "ERROR: Could not read pathPrefix from config.md"
            exit 1
          fi

          # Validate sitePath format (alphanumeric, slashes, hyphens, underscores only - no shell metacharacters)
          if ! echo "$SITE_PATH" | grep -qE '^[a-zA-Z0-9/_-]+$'; then
            echo "ERROR: Invalid pathPrefix value in config.md: '$SITE_PATH'. Must contain only alphanumeric characters, slashes, hyphens, or underscores."
            exit 1
          fi
          
          # Strip leading slash if present, then extract first path segment
          SITE_PREFIX=$(echo "$SITE_PATH" | sed 's|^/||' | cut -d'/' -f1)
          echo "SITE_PATH=$SITE_PATH" >> $GITHUB_ENV
          echo "SITE_PREFIX=$SITE_PREFIX" >> $GITHUB_ENV
          echo "site_path=$SITE_PATH" >> $GITHUB_OUTPUT
          echo "✓ Site path validated: $SITE_PATH (prefix: $SITE_PREFIX)"

      - name: Clone adp-devsite
        uses: actions/checkout@v6
        with:
          repository: AdobeDocs/adp-devsite
          path: adp-devsite

      - name: Clone devsite-runtime-connector
        uses: actions/checkout@v6
        with:
          repository: aemsites/devsite-runtime-connector
          path: devsite-runtime-connector

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "content/.nvmrc"  # must match path: in step checkout-content
          cache: npm
          cache-dependency-path: |
            content/package-lock.json
            adp-devsite/package-lock.json
            devsite-runtime-connector/package-lock.json

      - name: Install dependencies
        run: |
          cd content && npm install
          cd ../adp-devsite && npm install
          cd ../devsite-runtime-connector && npm install

      - name: Start development servers
        run: |
          ROOT_DIR=$(pwd)
          
          # Start content server (port 3003)
          (cd "$ROOT_DIR/content" && npm run dev > "$ROOT_DIR/content-server.log" 2>&1) &
          echo $! > /tmp/content.pid
          
          # Start adp-devsite markup proxy (port 3000)
          # Run node ./dev.mjs directly to avoid the npm run dev concurrently wrapper whose
          # dev:markup script ends with `open http://localhost:3000` (macOS-only; fails on Linux
          # and causes concurrently -k to kill the entire process group).
          (cd "$ROOT_DIR/adp-devsite" && node ./dev.mjs > "$ROOT_DIR/devsite-server.log" 2>&1) &
          echo $! > /tmp/devsite.pid

          # Start AEM CLI (port 3001) — required by dev.mjs to proxy non-docs content
          (cd "$ROOT_DIR/adp-devsite" && npx @adobe/aem-cli --no-open --port 3001 up > "$ROOT_DIR/aem-server.log" 2>&1) &
          echo $! > /tmp/aem.pid

          # Start runtime connector (port 3002)
          (cd "$ROOT_DIR/devsite-runtime-connector" && npm run dev > "$ROOT_DIR/connector-server.log" 2>&1) &
          echo $! > /tmp/connector.pid
          
          echo "Servers starting in background..."

      - name: Wait for servers to be ready
        run: |
          echo "Waiting for servers..."
          for port in 3000 3001 3002 3003; do
            for i in {1..60}; do
              if curl -s "http://localhost:$port" > /dev/null 2>&1; then
                echo "✓ Port $port is ready"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "✗ Port $port timeout"
                exit 1
              fi
              sleep 1
            done
          done
          
          # Verify site is accessible
          curl -sf "http://localhost:3000/${SITE_PATH}/" > /dev/null && echo "✓ Site is accessible"

      - name: Generate static site with wget
        run: |
          ROOT_DIR=$(pwd)
          mkdir -p "$ROOT_DIR/_site"
          
          # Generate URL list from markdown files
          cd "$ROOT_DIR/content"
          find src/pages -name "*.md" | sed 's|src/pages/||' | sed 's|\.md$||' | sed 's|/index$|/|' | while read path; do
            echo "http://localhost:3000/${SITE_PATH}/$path"
          done > "$ROOT_DIR/urls.txt"
          
          echo "Crawling $(wc -l < "$ROOT_DIR/urls.txt" | tr -d ' ') pages..."
          
          cd "$ROOT_DIR/_site"
          set +e
          wget \
            --input-file="$ROOT_DIR/urls.txt" \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --restrict-file-names=windows \
            --domains localhost \
            --execute robots=off \
            --wait=0.1 \
            --tries=3 \
            --timeout=30 \
            --quiet
          WGET_EXIT=$?
          set -e

          URL_COUNT=$(wc -l < "$ROOT_DIR/urls.txt" | tr -d ' ')
          HTML_COUNT=$(find localhost+3000 -name "*.html" 2>/dev/null | wc -l | tr -d ' ')
          echo "Crawled $HTML_COUNT HTML files from $URL_COUNT URLs (wget exit: $WGET_EXIT)"

          if [ "$HTML_COUNT" -lt 5 ]; then
            echo "ERROR: Only $HTML_COUNT HTML files generated — crawl likely failed"
            exit 1
          fi

          MIN_REQUIRED=$(( URL_COUNT * 80 / 100 ))
          if [ "$MIN_REQUIRED" -lt 5 ]; then
            MIN_REQUIRED=5
          fi
          if [ "$HTML_COUNT" -lt "$MIN_REQUIRED" ]; then
            echo "ERROR: Expected at least $MIN_REQUIRED pages but only $HTML_COUNT HTML files were generated"
            exit 1
          fi

          if [ "$WGET_EXIT" -ne 0 ]; then
            echo "WARNING: wget exited with code $WGET_EXIT but $HTML_COUNT pages were captured"
          fi

          echo "✓ wget crawl complete"

      - name: Fetch content server assets
        run: |
          cd _site

          # Find all asset paths referenced from the content server (127.0.0.1:3003).
          # wget's --domains localhost excludes 127.0.0.1, so these are never downloaded
          # during the main crawl and their URLs are left as localhost references.
          find localhost+3000 -name "*.html" -type f -print0 | \
            xargs -0 perl -ne 'print "$1\n" while m{http://127\.0\.0\.1:3003([^"<> ]+)}g' 2>/dev/null | \
            sort -u | while IFS= read -r asset_path; do
              asset_dir="localhost+3000$(dirname "$asset_path")"
              mkdir -p "$asset_dir"
              curl -sf "http://127.0.0.1:3003${asset_path}" -o "localhost+3000${asset_path}" && echo "✓ ${asset_path}" || true
            done

          # Rewrite all 127.0.0.1:3003 references to use the GitHub Pages base path
          find localhost+3000 -name "*.html" -type f -print0 | \
            xargs -0 perl -i -pe 's{http://127\.0\.0\.1:3003/}{/$ENV{PATH_PREFIX}/}g'

          echo "✓ Content server assets fetched and paths rewritten"

      - name: Copy static assets
        run: |
          cd _site
          
          # Copy hlx_statics from adp-devsite source
          mkdir -p localhost+3000/hlx_statics
          cp -r ../adp-devsite/hlx_statics/* localhost+3000/hlx_statics/
          echo "✓ Copied $(find localhost+3000/hlx_statics -type f | wc -l | tr -d ' ') static files"

      - name: Fetch API endpoints
        run: |
          cd _site
          mkdir -p "localhost+3000/${SITE_PATH}"
          mkdir -p localhost+3000/franklin_assets
          
          # Config (for side navigation)
          curl -sf "http://localhost:3000/${SITE_PATH}/config" -o "localhost+3000/${SITE_PATH}/config" && echo "✓ config"
          
          # Footer
          curl -sf "http://localhost:3000/franklin_assets/footer.plain.html" -o localhost+3000/franklin_assets/footer.plain.html && echo "✓ footer"
          
          # Product index map
          curl -sf "http://localhost:3000/franklin_assets/product-index-map.json" -o localhost+3000/franklin_assets/product-index-map.json && echo "✓ product-index-map"
          
          # Site-wide banner
          curl -sf "http://localhost:3000/${SITE_PATH}/site-wide-banner.json" -o "localhost+3000/${SITE_PATH}/site-wide-banner.json" || echo "○ site-wide-banner (optional)"

      - name: Fetch fragment includes
        run: |
          ROOT_DIR=$(pwd)
          cd "$ROOT_DIR/content"

          # Fragment blocks fetch .plain.html at runtime on GitHub Pages. The local dev
          # stack does not serve .plain.html URLs — fetch the rendered page and extract
          # <main> content to match the production .plain.html fragment format.
          # Output must be under ${SITE_PATH}/ so relative fetches from topic pages resolve.
          if [ -d src/pages/includes ]; then
            FAILED=0
            while IFS= read -r mdfile; do
              rel_path=$(echo "$mdfile" | sed 's|src/pages/||' | sed 's|\.md$||')
              out_dir="$ROOT_DIR/_site/localhost+3000/${SITE_PATH}/$(dirname "$rel_path")"
              out_file="$out_dir/$(basename "$rel_path").plain.html"
              mkdir -p "$out_dir"
              if curl -sf "http://localhost:3000/${SITE_PATH}/${rel_path}" | \
                perl -0777 -ne 'if (/<main[^>]*>(.*?)<\/main>/s) { print $1 }' > "$out_file" && \
                [ -s "$out_file" ]; then
                echo "✓ ${rel_path}.plain.html"
              else
                echo "✗ ${rel_path}.plain.html"
                rm -f "$out_file"
                FAILED=$((FAILED + 1))
              fi
            done < <(find src/pages/includes -name "*.md")

            if [ "$FAILED" -gt 0 ]; then
              echo "ERROR: $FAILED fragment include(s) failed to fetch"
              exit 1
            fi
          fi

      - name: Rewrite paths for GitHub Pages
        run: |
          cd _site
          
          # Rewrite config paths for side-nav filtering
          CONFIG_FILE="localhost+3000/${SITE_PATH}/config"
          if [ -f "$CONFIG_FILE" ]; then
            # Rewrite the main site path
            perl -i -pe "s|href=\"/${SITE_PATH}/|href=\"/${PATH_PREFIX}/${SITE_PATH}/|g" "$CONFIG_FILE"
            
            # Extract unique top-level nav paths from config.md pages section.
            # Expected format: Markdown links like [Label](/segment/index.md) where
            # /segment/ is a single path segment (regex: ](/[^/)]+/). Matches
            # /rest/, /graphql/, /get-started/ etc. but not multi-level paths like
            # /reference/rest/ or external URLs. If config.md changes format
            # (different delimiters, bare paths, multi-segment links), this grep
            # silently produces wrong or empty output — affected side-nav hrefs
            # won't be rewritten but the build continues. Update the regex if
            # config.md structure changes.
            grep -oE '\]\(/[^/)]+/' ../content/src/pages/config.md | \
              sed 's/](//' | \
              sort -u | while read nav_path; do
                perl -i -pe "s|\Qhref=\"${nav_path}\E|href=\"/${PATH_PREFIX}/${SITE_PATH}${nav_path}|g" "$CONFIG_FILE"
              done
            
            echo "✓ Config paths rewritten"
          fi

      - name: Organize output structure
        run: |
          cd _site
          
          # Move content from localhost+3000 to root
          if [ -d "localhost+3000" ]; then
            mv localhost+3000/* . 2>/dev/null || true
            rm -rf localhost+3000
            echo "✓ Output structure organized"
          fi

      - name: Rewrite static asset paths
        run: |
          cd _site

          # wget --convert-links emits relative paths like ../../hlx_statics/ that resolve
          # without the repo PATH_PREFIX on GitHub Pages, so scripts.js never loads and
          # client-side blocks (Fragment, SuperHero, Edition, etc.) stay unrendered.
          find . -name "*.html" -type f -print0 | \
            xargs -0 perl -i -pe '
              s/(href|src)="(\.\.\/)*hlx_statics\//$1="\/$ENV{PATH_PREFIX}\/hlx_statics\//g;
              s/(href|src)="(\.\.\/)*franklin_assets\//$1="\/$ENV{PATH_PREFIX}\/franklin_assets\//g;
            '

          echo "✓ Static asset paths rewritten"

      - name: Fix superhero block images
        run: |
          cd _site
          
          # The superhero.js expects <picture><img></picture> but we have plain <img>
          # Wrap superhero images in <picture> elements so the background works
          if [ -f "${SITE_PATH}/index.html" ]; then
            # Find <img> tags in superhero blocks and wrap them in <picture>
            perl -i -0pe 's|(<div class="superhero">.*?<div>\s*)<img ([^>]+)>(.*?</div>\s*</div>)|$1<picture><img $2></picture>$3|gs' "${SITE_PATH}/index.html"
            echo "✓ Superhero images wrapped in <picture>"
          fi

      - name: Inject GitHub Pages interceptor
        run: |
          cd _site
          
          # Interceptor script source is hardcoded (not user-controlled). Placeholder
          # substitution uses sed with / delimiters — PATH_PREFIX and SITE_PREFIX must
          # not contain slashes or other delimiter-breaking characters. PATH_PREFIX
          # comes from github.event.repository.name and SITE_PREFIX is regex-validated
          # earlier in this workflow, so both are safe today.
          TRUSTED_REPO="AdobeDocs/commerce-contributor"
          
          # Try local file first (for when this repo uses the workflow)
          LOCAL_SCRIPT="../content/.github/scripts/gh-pages-interceptor.js"
          
          if [ -f "$LOCAL_SCRIPT" ]; then
            echo "Using local interceptor script: $LOCAL_SCRIPT"
            INTERCEPTOR=$(cat "$LOCAL_SCRIPT" | sed "s/__PATH_PREFIX__/$PATH_PREFIX/g" | sed "s/__SITE_PREFIX__/$SITE_PREFIX/g" | tr '\n' ' ' | sed 's/  */ /g')
          else
            # Fetch from the hardcoded trusted source
            SCRIPT_URL="https://raw.githubusercontent.com/${TRUSTED_REPO}/main/.github/scripts/gh-pages-interceptor.js"
            echo "Fetching interceptor from trusted source: $SCRIPT_URL"
            INTERCEPTOR=$(curl -sf "$SCRIPT_URL" | sed "s/__PATH_PREFIX__/$PATH_PREFIX/g" | sed "s/__SITE_PREFIX__/$SITE_PREFIX/g" | tr '\n' ' ' | sed 's/  */ /g')
          fi
          
          if [ -z "$INTERCEPTOR" ]; then
            echo "ERROR: Failed to load interceptor script"
            exit 1
          fi
          
          # Create script tag
          echo "<script>${INTERCEPTOR}</script>" > /tmp/interceptor.txt
          
          # Inject into all HTML files
          find . -name "*.html" -type f | while read htmlfile; do
            perl -i -pe 'BEGIN{open(F,"/tmp/interceptor.txt");$s=<F>;chomp $s;close F} s/<head>/<head>$s/' "$htmlfile" 2>/dev/null || true
          done
          
          MODIFIED=$(grep -l "$PATH_PREFIX" "${SITE_PATH}"/*.html 2>/dev/null | wc -l | tr -d ' ')
          echo "✓ Interceptor injected into $MODIFIED files"

      - name: Add security headers
        run: |
          cd _site
          
          # Content Security Policy to mitigate XSS attacks
          # - 'self' allows resources from same origin
          # - 'unsafe-inline' required for the interceptor script and inline styles
          # - data: allows data URIs for images (used by some frameworks)
          # - blob: allows blob URIs (used for dynamic content)
          # - https: restricts external resources to HTTPS only
          CSP_CONTENT="default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:; frame-ancestors 'self';"
          CSP_TAG="<meta http-equiv=\"Content-Security-Policy\" content=\"${CSP_CONTENT}\">"
          
          # X-Content-Type-Options to prevent MIME sniffing
          XCTO_TAG="<meta http-equiv=\"X-Content-Type-Options\" content=\"nosniff\">"
          
          # Referrer-Policy for privacy
          RP_TAG="<meta name=\"referrer\" content=\"strict-origin-when-cross-origin\">"
          
          # Combine security meta tags
          SECURITY_TAGS="${CSP_TAG}${XCTO_TAG}${RP_TAG}"

          # Write to a temp file to avoid perl delimiter issues if tag content changes
          echo "${SECURITY_TAGS}" > /tmp/security-tags.txt

          # Inject security headers into all HTML files (after <head>)
          find . -name "*.html" -type f | while read htmlfile; do
            # Check if CSP already exists to avoid duplicates
            if ! grep -q "Content-Security-Policy" "$htmlfile" 2>/dev/null; then
              perl -i -pe 'BEGIN{open(F,"/tmp/security-tags.txt");$s=<F>;chomp $s;close F} s/<head>/<head>$s/' "$htmlfile" 2>/dev/null || true
            fi
          done
          
          SECURED=$(grep -l "Content-Security-Policy" "${SITE_PATH}"/*.html 2>/dev/null | wc -l | tr -d ' ')
          echo "✓ Security headers added to $SECURED files"

      - name: Create root redirect
        run: |
          cd _site
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'unsafe-inline'; img-src 'none'; frame-ancestors 'self';">
            <meta http-equiv="X-Content-Type-Options" content="nosniff">
            <meta name="referrer" content="strict-origin-when-cross-origin">
            <title>Preview</title>
          HTMLEOF
          # Add dynamic content with proper escaping
          echo "    <meta http-equiv=\"refresh\" content=\"0; url=${SITE_PATH}/\">" >> index.html
          echo "    <link rel=\"canonical\" href=\"${SITE_PATH}/\">" >> index.html
          cat >> index.html << 'HTMLEOF'
          </head>
          <body>
          HTMLEOF
          echo "    <p>Redirecting to <a href=\"${SITE_PATH}/\">documentation</a>...</p>" >> index.html
          cat >> index.html << 'HTMLEOF'
          </body>
          </html>
          HTMLEOF
          echo "✓ Root redirect created with security headers"

      - name: Stop servers
        if: always()
        run: |
          for pidfile in /tmp/content.pid /tmp/devsite.pid /tmp/aem.pid /tmp/connector.pid; do
            if [ -f "$pidfile" ]; then
              kill $(cat "$pidfile") 2>/dev/null || true
            fi
          done

      - name: Verify build output
        run: |
          cd _site
          HTML_COUNT=$(find . -name "*.html" | wc -l | tr -d ' ')
          echo "=== Build Summary ==="
          echo "Total files: $(find . -type f | wc -l | tr -d ' ')"
          echo "HTML files: $HTML_COUNT"

          if [ ! -d "${SITE_PATH}" ]; then
            echo "ERROR: No content generated!"
            exit 1
          fi

          if [ "$HTML_COUNT" -lt 5 ]; then
            echo "ERROR: Only $HTML_COUNT HTML files in output — build likely failed"
            exit 1
          fi

          if [ -d "${SITE_PATH}/includes" ]; then
            INCLUDE_COUNT=$(find "${SITE_PATH}/includes" -name "*.plain.html" | wc -l | tr -d ' ')
            if [ "$INCLUDE_COUNT" -lt 1 ]; then
              echo "ERROR: No fragment include .plain.html files in output — Fragment blocks will not render"
              exit 1
            fi
            echo "Fragment includes: $INCLUDE_COUNT .plain.html files"
          fi

          echo "✓ Build verification passed"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
