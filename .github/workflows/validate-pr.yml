---
# Reusable workflow called by PR-triggered workflows (pr-validate.yml).
# Runs content validation jobs only when src/pages/ files are changed,
# then reports a single status via the validate-pr gate job.
#
# Jobs:
#   check-files   — detects whether src/pages/ changed; gates all other jobs
#   toc           — validates table-of-contents config (npm run test:config)
#   markdown-lint — lints Markdown files (npm run lint:md)
#   lint          — runs adp-devsite-utils remark linter via adp-devsite-workflow
#   validate-pr   — required status check; passes when jobs above succeed or
#                   are skipped (no src/pages/ changes)
name: Validate pull request
on:
  workflow_call:
    inputs:
      base_ref:
        description: 'Base branch reference'
        required: true
        type: string
      pr_number:
        description: 'Pull request number (used to associate the linter report artifact with the PR)'
        required: false
        type: number
        default: 0

jobs:
  # Detects whether any src/pages/ files changed between HEAD and the base
  # branch. Sets run_validation output used to skip downstream jobs when
  # only non-content files (config, scripts, etc.) were modified.
  check-files:
    runs-on: ubuntu-latest
    outputs:
      run_validation: ${{ steps.filter.outputs.run_validation }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for src/pages changes
        id: filter
        run: |
          git fetch origin ${{ inputs.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ inputs.base_ref }}...HEAD)
          if echo "$CHANGED_FILES" | grep -q "^src/pages/"; then
            echo "run_validation=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected in src/pages/"
          else
            echo "run_validation=false" >> $GITHUB_OUTPUT
            echo "⏭️ No changes in src/pages/, skipping validation"
          fi

  # Validates the table-of-contents configuration so nav entries stay
  # consistent with the pages that exist in src/pages/.
  toc:
    needs: check-files
    if: needs.check-files.outputs.run_validation == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run TOC validation
        run: npm run test:config

  # Lints Markdown files for style and formatting issues.
  # Runs after toc so a broken config doesn't flood the log with lint noise.
  markdown-lint:
    needs: [check-files, toc]
    if: needs.check-files.outputs.run_validation == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint
        run: npm run lint:md

  # Runs adp-devsite-utils remark linter via the centralized lint workflow.
  # Runs after markdown-lint so basic formatting is clean before remark runs.
  lint:
    needs: [check-files, markdown-lint]
    if: needs.check-files.outputs.run_validation == 'true'
    uses: AdobeDocs/adp-devsite-workflow/.github/workflows/lint-v3.yml@DEVSITE-2424
    with:
      pr_number: ${{ inputs.pr_number }}

  # When src/pages/ is unchanged the lint job is skipped and produces no artifact.
  # Upload a sentinel so post-lint-comment-v3.yml can detect the skip gracefully.
  upload-lint-skip-marker:
    needs: [check-files]
    if: needs.check-files.outputs.run_validation != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create skipped marker
        run: echo "skipped" > lint-skipped.txt
      - name: Upload linter-report artifact (skipped marker)
        uses: actions/upload-artifact@v4
        with:
          name: linter-report
          path: lint-skipped.txt

  # Single required status check for branch protection rules.
  # Always runs so GitHub never sees a missing/skipped check on PRs that
  # touch only non-content files.
  validate-pr:
    runs-on: ubuntu-latest
    needs: [check-files, toc, markdown-lint, lint]
    if: always()
    steps:
      - name: Check validation results
        run: |
          # If no src/pages files changed, pass automatically
          if [[ "${{ needs.check-files.outputs.run_validation }}" == "false" ]]; then
            echo "✅ No src/pages/ files changed - validation skipped"
            exit 0
          fi

          # If src/pages files changed, check that all validation jobs succeeded
          if [[ "${{ needs.toc.result }}" == "success" ]] && \
             [[ "${{ needs.markdown-lint.result }}" == "success" ]] && \
             [[ "${{ needs.lint.result }}" == "success" ]]; then
            echo "✅ All validation checks passed"
            exit 0
          else
            echo "❌ One or more validation checks failed"
            echo "TOC: ${{ needs.toc.result }}"
            echo "Markdown Lint: ${{ needs.markdown-lint.result }}"
            echo "Lint: ${{ needs.lint.result }}"
            exit 1
          fi